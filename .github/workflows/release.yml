name: Build and Release Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Alfred workflow
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build workflow package
        run: /usr/bin/python3 build-workflow.py

      - name: Inspect renderer binary
        run: |
          file "build/workflow/bin/render-icon"
          lipo -info "build/workflow/bin/render-icon"

      - name: Read package checksum
        id: checksum
        run: |
          checksum=$(shasum -a 256 "dist/Nerd.Fonts.alfredworkflow" | cut -d ' ' -f 1)
          echo "digest=sha256:$checksum" >> "$GITHUB_OUTPUT"

      - name: Check current release asset digest
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          digest=$(gh release view latest --json assets --jq '.assets[] | select(.name == "Nerd.Fonts.alfredworkflow") | .digest' 2>/dev/null || true)
          legacy_checksum=$(gh release view latest --json assets --jq '.assets[] | select(.name == "Nerd.Fonts.alfredworkflow.sha256") | .name' 2>/dev/null || true)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "legacy_checksum=$legacy_checksum" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: publish
        run: |
          if [ "${{ steps.checksum.outputs.digest }}" = "${{ steps.current.outputs.digest }}" ] && [ -z "${{ steps.current.outputs.legacy_checksum }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Workflow package unchanged; not updating release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Workflow package changed; updating release."
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nerd-fonts-alfred-workflow
          path: dist/Nerd.Fonts.alfredworkflow

      - name: Create or update latest release
        if: steps.publish.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push --force origin refs/tags/latest

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest Nerd Fonts Alfred Workflow" \
              --notes "Download and install Nerd.Fonts.alfredworkflow. This rolling release was built from $GITHUB_SHA. Digest: ${{ steps.checksum.outputs.digest }}"
            gh release delete-asset latest "Nerd.Fonts.alfredworkflow.sha256" --yes || true
            gh release upload latest \
              "dist/Nerd.Fonts.alfredworkflow" \
              --clobber
          else
            gh release create latest \
              "dist/Nerd.Fonts.alfredworkflow" \
              --title "Latest Nerd Fonts Alfred Workflow" \
              --notes "Download and install Nerd.Fonts.alfredworkflow. This rolling release was built from $GITHUB_SHA. Digest: ${{ steps.checksum.outputs.digest }}"
          fi
